<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>에빙하우스 캘린더 매니저</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .btn-shadow { shadow-lg shadow-blue-200; }
        .modal-bg { background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <div class="max-w-md mx-auto p-6 pb-24">
        <header class="py-8 text-center">
            <h1 class="text-3xl font-black text-blue-600 tracking-tight italic">REMIND-IT</h1>
            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-[0.2em] mt-1">Ebbinghaus Scheduler</p>
        </header>

        <!-- 입력부 -->
        <div class="bg-white p-6 rounded-[2rem] shadow-xl shadow-slate-200 border border-white mb-8">
            <label class="block text-[10px] font-black text-slate-400 mb-3 ml-1 uppercase">New Learning Topic</label>
            <input type="text" id="topicInput" placeholder="공부한 주제를 입력하세요" 
                class="w-full p-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none mb-4 text-lg font-bold">
            <button onclick="handleRegistration()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold text-lg shadow-xl shadow-blue-100 active:scale-95 transition-all">
                학습 등록 (캘린더 연동)
            </button>
        </div>

        <div id="dashboard" class="space-y-4 text-sm font-medium"></div>
    </div>

    <!-- 성공 모달 -->
    <div id="successModal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-6 modal-bg">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 text-center shadow-2xl overflow-hidden relative">
            <div class="text-5xl mb-6">📅</div>
            <h3 class="text-2xl font-black text-slate-800 mb-2">달력에 추가할까요?</h3>
            <p class="text-slate-500 text-sm mb-8 leading-relaxed">
                확인 버튼을 누른 후, 상단 알림 바에서<br>
                <span class="font-bold text-blue-600 underline text-base">다운로드된 파일을 클릭</span>하면<br>
                4개의 복습 일정이 자동 등록됩니다.
            </p>
            
            <a id="downloadLink" onclick="closeModal()" class="block w-full bg-blue-600 text-white py-4 rounded-2xl font-bold text-lg mb-3 shadow-lg shadow-blue-100">
                파일 다운로드 & 열기
            </a>
            <button onclick="closeModal()" class="w-full py-2 text-slate-400 font-bold text-sm uppercase tracking-widest">나중에 하기</button>
        </div>
    </div>

    <script>
        let topics = JSON.parse(localStorage.getItem('ebbinghaus_v5') || '[]');

        function handleRegistration() {
            const input = document.getElementById('topicInput');
            const title = input.value.trim();
            if (!title) return;

            const now = Date.now();
            const schedules = [
                { label: '1차(10분)', due: now + 10 * 60 * 1000 },
                { label: '2차(1일)', due: now + 24 * 60 * 60 * 1000 },
                { label: '3차(7일)', due: now + 7 * 24 * 60 * 60 * 1000 },
                { label: '4차(30일)', due: now + 30 * 24 * 60 * 60 * 1000 }
            ];

            topics.push({ id: now, title, schedules });
            localStorage.setItem('ebbinghaus_v5', JSON.stringify(topics));
            
            render();
            showModal(title, schedules);
            input.value = '';
        }

        function showModal(title, schedules) {
            const icsContent = createICS(title, schedules);
            const blob = new Blob([icsContent], { type: 'text/calendar;charset=utf-8' });
            const url = window.URL.createObjectURL(blob);
            
            const link = document.getElementById('downloadLink');
            link.href = url;
            // 중복 방지를 위해 파일명에 타임스탬프 추가
            const timestamp = Math.floor(Date.now() / 1000);
            link.setAttribute("download", `복습_${timestamp}.ics`);
            
            document.getElementById('successModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('successModal').classList.add('hidden');
        }

        function createICS(title, schedules) {
            let ics = "BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//Ebbinghaus Manager//KO\nCALSCALE:GREGORIAN\nMETHOD:PUBLISH\n";
            const formatDate = (date) => new Date(date).toISOString().replace(/[-:]/g, "").split(".")[0] + "Z";
            
            schedules.forEach(s => {
                ics += "BEGIN:VEVENT\n";
                ics += `SUMMARY:[복습] ${title} (${s.label})\n`;
                ics += `DTSTART:${formatDate(s.due)}\n`;
                ics += `DTEND:${formatDate(s.due + 15 * 60 * 1000)}\n`;
                ics += `DESCRIPTION:에빙하우스 망각곡선 기반 복습 세션\\n주제: ${title}\\n차수: ${s.label}\n`;
                ics += "BEGIN:VALARM\nTRIGGER:-PT5M\nACTION:DISPLAY\nDESCRIPTION:복습 알림\nEND:VALARM\n";
                ics += "END:VEVENT\n";
            });
            ics += "END:VCALENDAR";
            return ics;
        }

        function render() {
            const container = document.getElementById('dashboard');
            container.innerHTML = '';
            topics.slice().reverse().forEach(t => {
                const card = document.createElement('div');
                card.className = 'bg-white rounded-2xl p-4 shadow-sm border border-slate-100 flex justify-between items-center';
                card.innerHTML = `
                    <div>
                        <h3 class="font-bold text-slate-800">${t.title}</h3>
                        <p class="text-[10px] text-slate-400">등록됨: ${new Date(t.id).toLocaleString('ko-KR')}</p>
                    </div>
                    <button onclick="deleteTopic(${t.id})" class="text-slate-300 p-2 text-xl">✕</button>
                `;
                container.appendChild(card);
            });
        }

        function deleteTopic(id) {
            if(confirm('이 목록을 삭제할까요?\n(이미 달력에 등록된 일정은 수동으로 지우셔야 합니다)')) {
                topics = topics.filter(t => t.id !== id);
                localStorage.setItem('ebbinghaus_v5', JSON.stringify(topics));
                render();
            }
        }
        render();
    </script>
</body>
</html>
