<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>에빙하우스 마스터 v6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .status-done { background-color: #ecfdf5; border-left: 4px solid #10b981; opacity: 0.6; }
        .status-ready { background-color: #fef2f2; border-left: 4px solid #ef4444; animation: pulse 2s infinite; }
        .status-waiting { background-color: #eff6ff; border-left: 4px solid #3b82f6; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.8; } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 pb-20">

    <div class="max-w-md mx-auto">
        <header class="py-8 text-center">
            <h1 class="text-3xl font-black text-slate-800 tracking-tighter">REVIEW FLOW</h1>
            <p class="text-[10px] text-blue-600 font-bold tracking-[0.3em] uppercase mt-1">Memory Management System</p>
        </header>

        <!-- 입력 영역 -->
        <div class="bg-white p-6 rounded-[2rem] shadow-xl shadow-slate-200 mb-8">
            <input type="text" id="topicInput" placeholder="공부할 주제를 입력하세요" 
                class="w-full p-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-blue-600 outline-none mb-4 text-lg font-bold text-slate-700">
            <button onclick="handleRegistration()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold text-lg active:scale-95 transition-all shadow-lg">
                학습 등록 & 캘린더 생성
            </button>
        </div>

        <!-- 리스트 영역 -->
        <div id="dashboard" class="space-y-6"></div>
    </div>

    <!-- 다운로드 안내 모달 -->
    <div id="modal" class="fixed inset-0 bg-black/60 z-50 hidden flex items-center justify-center p-6 backdrop-blur-sm">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 text-center shadow-2xl">
            <div class="text-5xl mb-4">📅</div>
            <h3 class="text-2xl font-bold text-slate-800 mb-2">캘린더 준비 완료</h3>
            <p class="text-slate-500 text-sm mb-8 leading-relaxed">
                다운로드된 파일을 클릭하여<br>
                <span class="font-bold text-blue-600">"모두 추가"</span>를 눌러야<br>
                4개의 알림이 정상 등록됩니다.
            </p>
            <a id="downloadBtn" onclick="closeModal()" class="block w-full bg-blue-600 text-white py-4 rounded-2xl font-bold text-lg mb-3 shadow-lg">
                파일 열기
            </a>
            <button onclick="closeModal()" class="w-full py-2 text-slate-400 font-bold text-xs uppercase tracking-widest">창 닫기</button>
        </div>
    </div>

    <script>
        let topics = JSON.parse(localStorage.getItem('ebbinghaus_final') || '[]');

        function handleRegistration() {
            const input = document.getElementById('topicInput');
            const title = input.value.trim();
            if (!title) return;

            const now = Date.now();
            const intervals = [
                { label: '1차(10분)', ms: 10 * 60 * 1000 },
                { label: '2차(1일)', ms: 24 * 60 * 60 * 1000 },
                { label: '3차(7일)', ms: 7 * 24 * 60 * 60 * 1000 },
                { label: '4차(30일)', ms: 30 * 24 * 60 * 60 * 1000 }
            ];

            const schedules = intervals.map(inv => ({
                label: inv.label,
                due: now + inv.ms,
                status: 'waiting'
            }));

            const newTopic = { id: now, title, schedules };
            topics.push(newTopic);
            save();

            // 캘린더 파일 생성 및 모달 표시
            const icsData = createICS(title, schedules);
            const blob = new Blob([icsData], { type: 'text/calendar;charset=utf-8' });
            const url = window.URL.createObjectURL(blob);
            
            const btn = document.getElementById('downloadBtn');
            btn.href = url;
            btn.setAttribute("download", `복습_${Math.floor(now/1000)}.ics`);
            
            document.getElementById('modal').classList.remove('hidden');
            input.value = '';
        }

        function createICS(title, schedules) {
            let ics = "BEGIN:VCALENDAR\nVERSION:2.0\nMETHOD:PUBLISH\nPRODID:-//Ebbinghaus//KO\n";
            const formatDate = (ms) => new Date(ms).toISOString().replace(/[-:]/g, "").split(".")[0] + "Z";
            
            schedules.forEach((s, idx) => {
                ics += "BEGIN:VEVENT\n";
                ics += `UID:${Date.now()}-${idx}@ebbinghaus.app\n`;
                ics += `DTSTAMP:${formatDate(Date.now())}\n`;
                ics += `SUMMARY:[복습] ${title} (${s.label})\n`;
                ics += `DTSTART:${formatDate(s.due)}\n`;
                ics += `DTEND:${formatDate(s.due + 10 * 60 * 1000)}\n`;
                ics += `DESCRIPTION:${title}의 에빙하우스 ${s.label} 복습 시간입니다.\n`;
                ics += "BEGIN:VALARM\nTRIGGER:-PT5M\nACTION:DISPLAY\nDESCRIPTION:복습알림\nEND:VALARM\n";
                ics += "END:VEVENT\n";
            });
            ics += "END:VCALENDAR";
            return ics;
        }

        function toggleComplete(tId, sIdx) {
            const topic = topics.find(t => t.id === tId);
            if (topic) {
                const currentStatus = topic.schedules[sIdx].status;
                topic.schedules[sIdx].status = (currentStatus === 'done' ? 'waiting' : 'done');
                save();
            }
        }

        function deleteTopic(id) {
            if (confirm("주제를 삭제하시겠습니까?\n주의: 달력에 등록된 일정은 해당 앱에서 직접 지우셔야 합니다.")) {
                topics = topics.filter(t => t.id !== id);
                save();
            }
        }

        function save() {
            localStorage.setItem('ebbinghaus_final', JSON.stringify(topics));
            render();
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        function render() {
            const container = document.getElementById('dashboard');
            container.innerHTML = '';
            const now = Date.now();

            topics.slice().reverse().forEach(t => {
                const card = document.createElement('div');
                card.className = 'bg-white rounded-[2rem] p-6 shadow-sm border border-slate-100';
                
                let schedulesHtml = '';
                t.schedules.forEach((s, idx) => {
                    const isDone = s.status === 'done';
                    const isReady = !isDone && now >= s.due;
                    const dateStr = new Date(s.due).toLocaleString('ko-KR', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});
                    
                    schedulesHtml += `
                        <button onclick="toggleComplete(${t.id}, ${idx})" 
                            class="p-3 rounded-2xl text-center transition-all ${isDone ? 'status-done' : (isReady ? 'status-ready' : 'status-waiting')}">
                            <div class="text-[9px] font-black text-slate-400 uppercase mb-1">${s.label}</div>
                            <div class="text-[11px] font-bold ${isDone ? 'text-green-600' : 'text-slate-600'}">${isDone ? 'DONE' : dateStr}</div>
                        </button>
                    `;
                });

                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4 px-1">
                        <h3 class="text-xl font-black text-slate-800 tracking-tight">${t.title}</h3>
                        <button onclick="deleteTopic(${t.id})" class="text-slate-300 hover:text-red-500 transition-colors italic text-sm font-bold">Delete</button>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        ${schedulesHtml}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        render();
    </script>
</body>
</html>
