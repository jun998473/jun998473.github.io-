<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>에빙하우스 캘린더 매니저</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen p-4">
    <div class="max-w-md mx-auto">
        <header class="py-6 text-center">
            <h1 class="text-2xl font-bold text-slate-800">📅 스마트 복습 플래너</h1>
            <p class="text-xs text-slate-500 mt-1">주제 등록 시 캘린더 알림 자동 생성</p>
        </header>

        <!-- 주제 입력 -->
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 mb-6">
            <input type="text" id="topicInput" placeholder="공부한 주제를 입력하세요" 
                class="w-full p-3 bg-slate-50 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none mb-3 text-sm">
            <button onclick="addTopicAndDownload()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold shadow-lg active:scale-95 transition">
                학습 등록 & 캘린더 파일 생성
            </button>
            <p class="text-[10px] text-gray-400 mt-2">* 생성된 파일을 열면 캘린더에 4회차 일정이 자동 등록됩니다.</p>
        </div>

        <!-- 리스트 -->
        <div id="dashboard" class="space-y-4"></div>
    </div>

    <script>
        let topics = JSON.parse(localStorage.getItem('ebbinghaus_cal_v1') || '[]');

        function save() { localStorage.setItem('ebbinghaus_cal_v1', JSON.stringify(topics)); render(); }

        // 캘린더 파일(ICS) 포맷 생성 함수
        function createICS(title, schedules) {
            let icsContent = "BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//Ebbinghaus Manager//KO\nCALSCALE:GREGORIAN\nMETHOD:PUBLISH\n";
            
            schedules.forEach((s, idx) => {
                const start = new Date(s.due);
                const end = new Date(s.due + 15 * 60 * 1000); // 15분간 복습 세션
                
                const formatDate = (date) => date.toISOString().replace(/[-:]/g, "").split(".")[0] + "Z";
                
                icsContent += "BEGIN:VEVENT\n";
                icsContent += `SUMMARY:[복습] ${title} (${s.label})\n`;
                icsContent += `DTSTART:${formatDate(start)}\n`;
                icsContent += `DTEND:${formatDate(end)}\n`;
                icsContent += `DESCRIPTION:에빙하우스 망각곡선 기반 ${s.label} 복습 미션입니다.\\n학습 주제: ${title}\n`;
                icsContent += "BEGIN:VALARM\nTRIGGER:-PT5M\nACTION:DISPLAY\nDESCRIPTION:복습 알림\nEND:VALARM\n"; // 5분 전 알림
                icsContent += "END:VEVENT\n";
            });

            icsContent += "END:VCALENDAR";
            return icsContent;
        }

        function downloadICS(filename, content) {
            const blob = new Blob([content], { type: 'text/calendar;charset=utf-8' });
            const link = document.createElement("a");
            link.href = window.URL.createObjectURL(blob);
            link.setAttribute("download", filename);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function addTopicAndDownload() {
            const input = document.getElementById('topicInput');
            if (!input.value.trim()) return;

            const now = Date.now();
            const intervals = [
                { l: '1차(10분)', t: 10 * 60 * 1000 },
                { l: '2차(1일)', t: 24 * 60 * 60 * 1000 },
                { l: '3차(7일)', t: 7 * 24 * 60 * 60 * 1000 },
                { l: '4차(30일)', t: 30 * 24 * 60 * 60 * 1000 }
            ];

            const newSchedules = intervals.map(inv => ({
                label: inv.l,
                due: now + inv.t,
                status: 'waiting'
            }));

            topics.push({ id: now, title: input.value, schedules: newSchedules });

            // 캘린더 파일 생성 및 다운로드
            const icsData = createICS(input.value, newSchedules);
            downloadICS(`${input.value}_복습일정.ics`, icsData);

            input.value = '';
            save();
            alert("캘린더 파일이 생성되었습니다!\n파일을 열어 '모두 추가'를 누르면 달력에 등록됩니다.");
        }

        function render() {
            const container = document.getElementById('dashboard');
            container.innerHTML = '';
            topics.slice().reverse().forEach(t => {
                const card = document.createElement('div');
                card.className = 'bg-white rounded-2xl p-4 shadow-sm border border-slate-200';
                let html = `<div class="flex justify-between items-center mb-3">
                                <h3 class="font-bold text-slate-800">${t.title}</h3>
                                <button onclick="deleteTopic(${t.id})" class="text-slate-300">✕</button>
                            </div>
                            <div class="grid grid-cols-2 gap-2">`;
                t.schedules.forEach(s => {
                    const date = new Date(s.due).toLocaleString('ko-KR', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});
                    html += `<div class="bg-slate-50 p-2 rounded-xl text-center border border-slate-100">
                                <div class="text-[9px] font-bold text-slate-400 uppercase">${s.label}</div>
                                <div class="text-[11px] font-medium text-slate-600">${date}</div>
                             </div>`;
                });
                card.innerHTML = html + `</div>`;
                container.appendChild(card);
            });
        }

        function deleteTopic(id) { if(confirm('삭제할까요?')) { topics = topics.filter(t => t.id !== id); save(); } }

        render();
    </script>
</body>
</html>
